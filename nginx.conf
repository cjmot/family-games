server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite base is /family-games/, so redirect root requests there.
    location = / {
        return 302 /family-games/;
    }

    # Serve static assets and fallback to SPA entry for client-side routes.
    location /family-games/ {
        try_files $uri $uri/ /family-games/index.html;
    }
}

